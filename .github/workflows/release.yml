name: Build & Release

# Runs when you push a version tag like v1.0.0.
# Builds Evermist on Windows, macOS, and Linux in parallel,
# then attaches each installer to the GitHub Release for that tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # lets the job upload files to the Release

jobs:
  build:
    strategy:
      fail-fast: false   # if one OS fails, the others still finish
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the installer
        run: npx electron-builder --publish never
        env:
          # We are not paying for code signing, so tell electron-builder
          # not to look for a signing certificate (otherwise the mac build fails).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Attach the installer to the Release
        uses: softprops/action-gh-release@v2
        with:
          # Each OS uploads only its own installer; the other globs match
          # nothing on that runner, which is fine.
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
