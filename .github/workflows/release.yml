name: Build & Release

# Runs when you push a version tag like v1.0.0.
# Builds Evermist on Windows, macOS, and Linux in parallel,
# then attaches each installer to a GitHub Release for that tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # lets the job create the Release and upload files

jobs:
  build:
    strategy:
      fail-fast: false   # if one OS fails, the others still finish
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to the Release
        run: npx electron-builder --publish always
        env:
          # GitHub provides this automatically — it lets electron-builder
          # create the Release and upload the installers.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We are not paying for code signing, so tell electron-builder
          # not to look for a signing certificate (otherwise the mac build fails).
          CSC_IDENTITY_AUTO_DISCOVERY: false
