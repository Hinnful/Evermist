  #card {
    position: absolute; inset: 0;
    border-radius: 18px;
    background:

    border: 1px solid rgba(122, 95, 208, 0.30);
    display: flex; flex-direction: column; align-items: center; justify-content: center;

    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    opacity: 0; animation: fadeIn 0.45s ease forwards;

  #loader { width: 168px; height: 3px; border-radius: 3px; background: rgba(160, 144, 208, 0.14); overflow: hidden; margin-top: 6px; }
  #loader::after {
    content: ""; display: block; height: 100%; width: 40%;
    border-radius: 3px;
    background: linear-gradient(90deg, rgba(109,86,176,0) 0%, #8f7ed8 50%, rgba(109,86,176,0) 100%);
    animation: sweep 1.25s ease-in-out infinite;
  }
  @keyframes sweep { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
